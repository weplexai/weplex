name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch: aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            arch: x64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Weplex ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Sign update bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          TAR_GZ="$BUNDLE_DIR/Weplex.app.tar.gz"
          if [ -f "$TAR_GZ" ]; then
            pnpm tauri signer sign "$TAR_GZ" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" || true
            ls -la "$BUNDLE_DIR"/*.sig 2>/dev/null || echo "No sig generated"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Weplex.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Weplex.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.BEGET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 155.212.129.116 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to dl.weplex.ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SERVER="root@155.212.129.116"
          REMOTE_DIR="/opt/weplex-releases/v${VERSION}"

          # Create remote directory
          ssh $SERVER "mkdir -p $REMOTE_DIR"

          # Upload build artifacts (DMG + tar.gz + sig)
          find artifacts -type f | while read f; do
            scp "$f" "$SERVER:$REMOTE_DIR/$(basename $f)"
          done

          # Read signatures from artifacts (uploaded by build step)
          AARCH64_SIG=$(cat artifacts/build-aarch64/macos/Weplex.app.tar.gz.sig 2>/dev/null || echo "")
          X64_SIG=$(cat artifacts/build-x64/macos/Weplex.app.tar.gz.sig 2>/dev/null || echo "")
          echo "aarch64 sig length: ${#AARCH64_SIG}"
          echo "x64 sig length: ${#X64_SIG}"

          # Generate version.json
          cat > /tmp/version.json << EOF
          {
            "version": "${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "notes": "Release v${VERSION}",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://dl.weplex.ai/v${VERSION}/Weplex_aarch64.app.tar.gz",
                "signature": "${AARCH64_SIG}"
              },
              "darwin-x86_64": {
                "url": "https://dl.weplex.ai/v${VERSION}/Weplex_x64.app.tar.gz",
                "signature": "${X64_SIG}"
              }
            }
          }
          EOF
          scp /tmp/version.json "$SERVER:/opt/weplex-releases/version.json"

          # Update nginx latest redirects
          ssh $SERVER "for conf in dl-weplex dl-weplex-ai; do
            sed -i \
              -e 's|return 302 /v[^/]*/Weplex_.*_aarch64.dmg;|return 302 /v${VERSION}/Weplex_${VERSION}_aarch64.dmg;|' \
              -e 's|return 302 /v[^/]*/Weplex_.*_x64.dmg;|return 302 /v${VERSION}/Weplex_${VERSION}_x64.dmg;|' \
              /etc/nginx/sites-available/\$conf 2>/dev/null
          done && nginx -t && systemctl reload nginx"

          echo "Deployed v${VERSION} to dl.weplex.ai"
